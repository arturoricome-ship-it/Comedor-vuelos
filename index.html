<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1623">
<title>South Alicante · Pantalla vuelos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1623;--navy:#1a2744;--navy2:#243460;--card:#182135;--card2:#202d49;
  --gold:#c8a84b;--gold2:#e8c96a;--white:#f0eee8;--muted:#8a93a8;--border:rgba(255,255,255,.08);
  --green:#4ade80;--blue:#60a5fa;--red:#f87171;--orange:#fb923c;--cyan:#40d0f0;--violet:#c084fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;overflow:auto;background:var(--bg);color:var(--white);font-family:"Outfit",sans-serif}
body{background:
  radial-gradient(circle at 18% 0%,rgba(96,165,250,.12),transparent 32%),
  radial-gradient(circle at 82% 8%,rgba(200,168,75,.12),transparent 34%),
  linear-gradient(160deg,#101c31 0%,#0d1623 62%,#08111c 100%);
}
#app{min-height:100vh;width:100%;display:flex;flex-direction:column;padding:18px 22px 20px;gap:16px}
.header{display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;min-height:78px;border-bottom:1px solid rgba(200,168,75,.35);padding-bottom:14px}
.logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:#10203a;font-family:"Bebas Neue",sans-serif;font-size:30px;letter-spacing:.8px;box-shadow:0 8px 28px rgba(200,168,75,.24)}
.title h1{font-family:"Bebas Neue",sans-serif;font-size:48px;letter-spacing:3px;line-height:.9;color:var(--white)}
.title .sub{margin-top:8px;color:var(--gold);font-size:15px;letter-spacing:2.7px;font-weight:800;text-transform:uppercase}
.status-top{display:flex;gap:12px;align-items:stretch;justify-content:flex-end}
.pill{border:1px solid var(--border);background:rgba(255,255,255,.045);border-radius:16px;padding:10px 14px;min-width:125px;text-align:center}
.pill .label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);font-weight:800}.pill .value{font-size:24px;font-weight:900;color:var(--gold2);line-height:1.1;margin-top:2px}.pill.live .value{color:var(--green)}
.live-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 14px rgba(74,222,128,.7);animation:pulse 1.6s ease-in-out infinite;margin-right:6px}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.columns{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.panel{min-height:0;border:1px solid rgba(255,255,255,.075);border-radius:26px;background:rgba(24,33,53,.78);box-shadow:0 14px 40px rgba(0,0,0,.25);display:flex;flex-direction:column;overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.07);background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.025))}
.panel-title{display:flex;align-items:center;gap:12px;font-family:"Bebas Neue",sans-serif;font-size:40px;letter-spacing:1.8px;line-height:1}.panel-title .ico{font-size:34px}.panel-count{font-size:18px;font-weight:900;color:var(--gold2);border:1px solid rgba(200,168,75,.35);border-radius:999px;padding:7px 13px;background:rgba(200,168,75,.08)}
.list{flex:1;min-height:0;overflow:visible;padding:10px;display:flex;flex-direction:column;gap:8px}
.flight{display:grid;grid-template-columns:110px minmax(0,1fr) 210px;gap:12px;align-items:center;border:1px solid rgba(255,255,255,.07);border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.052),rgba(255,255,255,.025));padding:9px 12px;min-height:74px;position:relative;overflow:hidden}
.flight::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(200,168,75,.85);opacity:.85}.flight.delayed::before{background:var(--red)}.flight.active::before{background:var(--green)}.flight.equip::before{background:var(--cyan)}.flight.cancelled::before{background:var(--red)}.flight.tomorrow{opacity:.88}
.num{font-family:"Bebas Neue",sans-serif;font-size:34px;letter-spacing:1.6px;color:var(--gold2);line-height:1}.subnum{font-size:12px;color:var(--muted);font-weight:800;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.city{font-size:25px;font-weight:900;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.time{font-size:16px;color:var(--muted);font-weight:800;margin-top:4px}.oldtime{color:rgba(248,113,113,.9);text-decoration:line-through;margin-right:8px}.right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:0;overflow:visible}.state{font-size:14px;font-weight:900;border-radius:999px;padding:6px 10px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}.countdown{font-size:19px;font-weight:900;color:var(--white);font-variant-numeric:tabular-nums;white-space:nowrap;max-width:none;overflow:visible}.countdown.ct-now{color:var(--orange)}.countdown.ct-soon{color:var(--red);animation:pulseText 1.2s ease-in-out infinite}@keyframes pulseText{0%,100%{opacity:1}50%{opacity:.45}}
.e-scheduled{background:rgba(200,168,75,.15);color:var(--gold2)}.e-active{background:rgba(74,222,128,.15);color:var(--green)}.e-landed{background:rgba(96,165,250,.14);color:#93c5fd}.e-cancelled{background:rgba(248,113,113,.15);color:var(--red)}.e-delayed{background:rgba(248,113,113,.18);color:var(--red);box-shadow:0 0 14px rgba(248,113,113,.15)}.e-boarding{background:rgba(96,165,250,.14);color:var(--blue)}.e-gate{background:rgba(192,132,252,.15);color:var(--violet)}.e-equip{background:rgba(64,208,240,.15);color:var(--cyan)}.e-taxiing{background:rgba(251,146,60,.15);color:var(--orange)}.e-final{background:rgba(148,163,184,.12);color:#94a3b8}
.sep{display:flex;align-items:center;gap:12px;color:var(--gold2);font-size:15px;font-weight:900;letter-spacing:1.3px;text-transform:uppercase;margin:4px 6px}.sep::before,.sep::after{content:"";height:1px;background:rgba(200,168,75,.28);flex:1}.empty,.error,.loading{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:24px;font-weight:800;line-height:1.35}.error{color:var(--red)}.loading::before{content:"";width:20px;height:20px;border-radius:50%;border:3px solid rgba(200,168,75,.2);border-top-color:var(--gold2);animation:spin 1s linear infinite;margin-right:12px}@keyframes spin{to{transform:rotate(360deg)}}
.footer{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:700;padding:0 4px}.footer b{color:var(--gold2)}.fs-btn{border:1px solid rgba(200,168,75,.35);background:rgba(200,168,75,.08);color:var(--gold2);border-radius:12px;padding:8px 12px;font:800 13px "Outfit";cursor:pointer}
@media(max-width:1200px){.flight{grid-template-columns:92px minmax(0,1fr) 180px}.num{font-size:30px}.city{font-size:22px}.state{font-size:12px}.countdown{font-size:17px}.panel-title{font-size:34px}.title h1{font-size:40px}}
@media(max-width:850px){#app{overflow:auto;height:auto;min-height:100vh}.columns{grid-template-columns:1fr}.header{grid-template-columns:auto 1fr}.status-top{grid-column:1/-1;justify-content:flex-start}.panel{min-height:70vh}.flight{grid-template-columns:84px 1fr 128px}.city{font-size:21px}.num{font-size:28px}.pill{min-width:100px}}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="logo">South</div>
    <div class="title">
      <h1>Vuelos ALC en tiempo real</h1>
      <div class="sub">Pantalla operativa · Alicante</div>
    </div>
    <div class="status-top">
      <div class="pill live"><div class="label"><span class="live-dot"></span>Estado</div><div class="value" id="statusLive">Live</div></div>
      <div class="pill"><div class="label">Hora</div><div class="value" id="clock">--:--</div></div>
      <div class="pill"><div class="label">Actualizado</div><div class="value" id="updated">--:--</div></div>
      <div class="pill"><div class="label">Recarga</div><div class="value" id="nextRefresh">5:00</div></div>
    </div>
  </header>

  <main class="columns">
    <section class="panel">
      <div class="panel-head"><div class="panel-title"><span class="ico">🛬</span>Llegadas</div><div class="panel-count" id="countArr">0 vuelos</div></div>
      <div class="list" id="arrivals"><div class="loading">Cargando llegadas…</div></div>
    </section>
    <section class="panel">
      <div class="panel-head"><div class="panel-title"><span class="ico">🛫</span>Salidas</div><div class="panel-count" id="countDep">0 vuelos</div></div>
      <div class="list" id="departures"><div class="loading">Cargando salidas…</div></div>
    </section>
  </main>

  <footer class="footer">
    <div>Fuente: servidor Railway/AENA usado por la app South. <b>Actualización automática cada 5 min</b>.</div>
    <button class="fs-btn" onclick="toggleFullScreen()">Pantalla completa</button>
  </footer>
</div>
<script>
const RAILWAY="https://aena-vuelos-server-production.up.railway.app";
const REFRESH_SECONDS=300;
const VISIBLE_FUTURE_MIN=1440; // muestra todos los vuelos futuros del día; antes estaba limitado a 12h
let liveData={lle:[],sal:[]};
let refreshLeft=REFRESH_SECONDS;
let loading=false;
let serverOffsetMs=0; // corrige si el reloj de la TV/navegador está mal

const CIUDADES={"ALC":"Alicante","BCN":"Barcelona","MAD":"Madrid","VLC":"Valencia","SVQ":"Sevilla","BIO":"Bilbao","PMI":"Palma","IBZ":"Ibiza","MAH":"Menorca","TFN":"Tenerife Norte","TFS":"Tenerife Sur","LPA":"Gran Canaria","ACE":"Lanzarote","FUE":"Fuerteventura","LCG":"A Coruña","SCQ":"Santiago","OVD":"Asturias","VGO":"Vigo","ZAZ":"Zaragoza","GRX":"Granada","AGP":"Málaga","XRY":"Jerez","CDG":"París","ORY":"París Orly","LHR":"Londres","LGW":"Londres","STN":"Londres","AMS":"Ámsterdam","FCO":"Roma","MXP":"Milán","VCE":"Venecia","NCE":"Niza","DUB":"Dublín","LIS":"Lisboa","OPO":"Oporto","ATH":"Atenas","IST":"Estambul","BRU":"Bruselas","FRA":"Fráncfort","MUC":"Múnich","VIE":"Viena","WAW":"Varsovia","PRG":"Praga","BUD":"Budapest","GVA":"Ginebra","ZRH":"Zúrich","CPH":"Copenhague","ARN":"Estocolmo","HEL":"Helsinki","OSL":"Oslo","TLV":"Tel Aviv","CMN":"Casablanca","RAK":"Marrakech","TUN":"Túnez","ALG":"Argel","ORN":"Orán","BOD":"Burdeos","NTE":"Nantes","TLS":"Toulouse","MPL":"Montpellier","REU":"Reus","GRO":"Gerona","SDR":"Santander","LEI":"Almería","RMU":"Murcia"};
function pad(n){return String(n).padStart(2,"0");}
function esc(s){return String(s??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));}
function hToMin(h){if(!h||String(h).indexOf(":")<0)return null;let p=String(h).split(":"),hh=parseInt(p[0],10),mm=parseInt(p[1],10);if(isNaN(hh)||isNaN(mm))return null;return hh*60+mm;}
function nowReal(){return new Date(Date.now()+serverOffsetMs);}
function nowMinReal(){let n=nowReal();return n.getHours()*60+n.getMinutes();}
function cityName(raw){let x=String(raw||"").trim();if(!x)return "--";let parts=x.split("-").map(s=>s.trim()).filter(Boolean);let first=parts[0]||x;if(CIUDADES[first])return CIUDADES[first];return first.replace("El Prat De Llobregat","Barcelona").replace("Adolfo Suarez","Madrid").replace("Josep Tarradellas","Barcelona").replace("Norte Los Rodeos","Tenerife Norte").replace("Reina Sofia","Tenerife Sur").replace("Charles De Gaulle","París").replace("Heathrow","Londres").replace("Gatwick","Londres").replace("Schiphol","Ámsterdam").replace("Boumediene","Argel").replace("Airport","").replace("International","").replace(/\s+/g," ").trim();}
function eLabel(s){
  if(!s)return{t:"Programado",c:"e-scheduled"};
  s=String(s).toLowerCase();
  if(/entrega|equipaje|baggage|reclaim|cinta|belt/.test(s))return{t:"Entrega equipajes",c:"e-equip"};
  if(/aterriz|landed|arrived|llegad/.test(s))return{t:"Aterrizado",c:"e-landed"};
  if(s==="en tierra"||s==="on ground"||s==="tierra")return{t:"En tierra",c:"e-landed"};
  if(/embarque|boarding/.test(s))return{t:"Embarque",c:"e-boarding"};
  if(/puerta|gate/.test(s))return{t:"Puerta",c:"e-gate"};
  if(/taxi|rodaje/.test(s))return{t:"Rodaje",c:"e-taxiing"};
  if(s==="active"||s==="en route"||s.indexOf("en vuelo")!==-1)return{t:"En vuelo",c:"e-active"};
  if(s.indexOf("cancel")!==-1)return{t:"Cancelado",c:"e-cancelled"};
  if(s.indexOf("delay")!==-1||s.indexOf("retras")!==-1)return{t:"Retrasado",c:"e-delayed"};
  return{t:s.replace(/^./,m=>m.toUpperCase()),c:"e-scheduled"};
}
function normalizeFlight(v,tipo){
  v=v||{};
  let txt=[v.estado,v.estadoAena,v.status,v.rawStatus,v.situacion,v.observaciones,v.info,v.remark,v.remarkPublic,v.descripcion].map(x=>x||"").join(" ").toLowerCase();
  if(!v.estadoClass){let el=eLabel(v.estado||v.estadoAena||v.status||v.rawStatus||txt);v.estado=el.t;v.estadoClass=el.c;}

  // IMPORTANTE LLEGADAS:
  // Tener cinta asignada NO significa entrega de equipajes. AENA puede publicar la cinta antes de que llegue el avión.
  // Solo mostramos "Entrega equipajes" si AENA lo dice explícitamente, o si el avión ya está aterrizado/pasado.
  if(tipo==="llegadas"){
    let explicitEquip=/entrega|equipaje|baggage|reclaim|belt/.test(txt);
    let scheduledMin=hToMin(v.horaReal||v.horaProg||v.hora||"");
    let diff=(scheduledMin===null)?99999:(scheduledMin-nowMinReal());
    if(v.esManana)diff+=1440;

    if(explicitEquip){
      v.estado="Entrega equipajes";
      v.estadoClass="e-equip";
    }else if((v.estadoClass||"")==="e-active"){
      // Si todavía falta para la llegada, es "En vuelo", aunque ya tenga cinta.
      if(diff>0){v.estado="En vuelo";v.estadoClass="e-active";}
      // Si ya pasó la hora real/estimada y venía como active, entonces sí puede pasar a equipajes.
      else if(diff>=-45&&(v.cinta||v.sala)){v.estado="Entrega equipajes";v.estadoClass="e-equip";}
    }else if((v.estadoClass||"")==="e-landed"&&(v.cinta||v.sala)&&diff<=0&&diff>=-60){
      v.estado="Entrega equipajes";
      v.estadoClass="e-equip";
    }
  }
  return v;
}
function extractLiveVuelos(res,tipo){
  let arr=[];
  if(!res)arr=[];else if(Array.isArray(res))arr=res;else if(Array.isArray(res.vuelos))arr=res.vuelos;else if(tipo==="llegadas"&&Array.isArray(res.llegadas))arr=res.llegadas;else if(tipo==="salidas"&&Array.isArray(res.salidas))arr=res.salidas;else if(Array.isArray(res.data))arr=res.data;else if(Array.isArray(res.items))arr=res.items;else if(Array.isArray(res.flights))arr=res.flights;else if(res.result){if(Array.isArray(res.result))arr=res.result;else if(Array.isArray(res.result.vuelos))arr=res.result.vuelos;else if(tipo==="llegadas"&&Array.isArray(res.result.llegadas))arr=res.result.llegadas;else if(tipo==="salidas"&&Array.isArray(res.result.salidas))arr=res.result.salidas;}
  return arr.map(v=>normalizeFlight(v,tipo));
}
function minutesUntil(v){
  let h=v.horaReal||v.horaProg||"";
  let m=hToMin(h);
  if(m===null)return 99999;
  let d=m-nowMinReal();
  // IMPORTANTE: no convertir vuelos pasados en “mañana” salvo que AENA/servidor lo marque explícitamente.
  if(v.esManana)d+=1440;
  return d;
}
function isVisible(v,tipo){
  let cls=v.estadoClass||"";
  let d=minutesUntil(v);
  if(v.esManana)return true;

  // Cancelados: solo visibles si están cerca; no deben quedarse medio día.
  if(cls==="e-cancelled")return d>=-60 && d<=VISIBLE_FUTURE_MIN;

  if(tipo==="llegadas"){
    // Llegadas ya aterrizadas/en equipajes: mantener un rato operativo, pero no horas.
    if(cls==="e-landed"||cls==="e-equip")return d>=-45 && d<=VISIBLE_FUTURE_MIN;
    // Si una llegada programada ya ha pasado más de 15 min y no cambió de estado, se oculta para evitar basura vieja.
    return d>=-15 && d<=VISIBLE_FUTURE_MIN;
  }

  // Salidas en vuelo: mantener un margen corto tras la salida.
  if(cls==="e-active")return d>=-40 && d<=VISIBLE_FUTURE_MIN;
  // Salidas programadas/embarque/puerta/retrasadas: no mostrar si la hora ya pasó claramente.
  return d>=-10 && d<=VISIBLE_FUTURE_MIN;
}
function sortFlights(a,b){return minutesUntil(a)-minutesUntil(b);}
function flightClass(v){let cls=v.estadoClass||"";if(cls==="e-delayed")return" delayed";if(cls==="e-active")return" active";if(cls==="e-equip")return" equip";if(cls==="e-cancelled")return" cancelled";return"";}
function renderList(id,flights,tipo){
  let box=document.getElementById(id);
  let data=flights.filter(v=>isVisible(v,tipo)).sort(sortFlights);
  let total=data.length;
  if(!total){document.getElementById(tipo==="llegadas"?"countArr":"countDep").textContent="0 vuelos";box.innerHTML='<div class="empty">Sin vuelos visibles ahora mismo</div>';return;}
  document.getElementById(tipo==="llegadas"?"countArr":"countDep").textContent= total+" vuelos";
  let html="";let sep=false;
  data.forEach(v=>{
    if(v.esManana&&!sep){sep=true;let dm=new Date();dm.setDate(dm.getDate()+1);let meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];html+=`<div class="sep">Mañana ${dm.getDate()} ${meses[dm.getMonth()]}</div>`;}
    let num=v.numero||v.flightNumber||v.vuelo||"Vuelo";
    let city=tipo==="salidas"?cityName(v.destino||v.destination||v.aeropuertoDestino):cityName(v.origen||v.origin||v.aeropuertoOrigen||v.destino);
    let horaProg=v.horaProg||v.hora||"--:--";let horaReal=v.horaReal||"";
    let timeHtml=(horaReal&&horaReal!==horaProg)?`<span class="oldtime">${esc(horaProg)}</span>${esc(horaReal)}`:esc(horaProg);
    let extra="";if(tipo==="salidas"&&v.puerta)extra="Puerta "+v.puerta;if(tipo==="llegadas"&&v.cinta)extra="Cinta "+v.cinta;if(tipo==="llegadas"&&!v.cinta&&v.sala)extra="Sala "+v.sala;
    html+=`<div class="flight${flightClass(v)}${v.esManana?' tomorrow':''}" data-hora="${esc(horaReal||horaProg)}" data-estado-class="${esc(v.estadoClass||'')}" data-es-manana="${v.esManana?'1':'0'}" data-tipo="${tipo}">
      <div><div class="num">${esc(num)}</div>${extra?`<div class="subnum">${esc(extra)}</div>`:""}</div>
      <div><div class="city">${esc(city)}</div><div class="time">${timeHtml}</div></div>
      <div class="right"><div class="state ${esc(v.estadoClass||'e-scheduled')}">${esc(v.estado||'Programado')}</div><div class="countdown">—</div></div>
    </div>`;
  });
  box.innerHTML=html;
  updateCountdowns();
}
function updateCountdowns(){
  document.querySelectorAll('.flight').forEach(row=>{
    let el=row.querySelector('.countdown');if(!el)return;
    let h=row.getAttribute('data-hora')||"";let m=hToMin(h);let cls=row.getAttribute('data-estado-class')||"";
    if(!h||m===null){el.textContent="";return;}
    let diff=m-nowMinReal();
    if(row.getAttribute('data-es-manana')==='1')diff+=1440;
    if(cls==='e-active'&&row.getAttribute('data-tipo')==='salidas'){el.textContent='En vuelo';el.className='countdown ct-now';return;}
    if(diff<0){el.textContent='';return;}
    let days=Math.floor(diff/1440),rest=diff%1440,hh=Math.floor(rest/60),mm=rest%60;
    el.textContent=(days>0?days+'d ':'')+(hh>0?hh+'h ':'')+mm+'m';
    el.className='countdown'+(diff<=15?' ct-soon':diff<=60?' ct-now':'');
  });
}
function renderAll(){renderList('arrivals',liveData.lle,'llegadas');renderList('departures',liveData.sal,'salidas');}
async function loadLive(){
  if(loading)return;loading=true;document.getElementById('statusLive').textContent='Cargando';
  try{
    let rL=await fetch(RAILWAY+"/vuelos?tipo=llegadas",{cache:'no-store'});
    let dateHeader=rL.headers.get('date');
    if(dateHeader){serverOffsetMs=new Date(dateHeader).getTime()-Date.now();}
    let jL=await rL.json();
    let rS=await fetch(RAILWAY+"/vuelos?tipo=salidas",{cache:'no-store'});let jS=await rS.json();
    liveData.lle=extractLiveVuelos(jL,'llegadas');liveData.sal=extractLiveVuelos(jS,'salidas');
    let n=nowReal();document.getElementById('updated').textContent=pad(n.getHours())+':'+pad(n.getMinutes());document.getElementById('statusLive').textContent='Live';
    renderAll();refreshLeft=REFRESH_SECONDS;
  }catch(e){
    document.getElementById('statusLive').textContent='Error';
    if(!liveData.lle.length)document.getElementById('arrivals').innerHTML='<div class="error">Error al cargar llegadas desde Railway/AENA</div>';
    if(!liveData.sal.length)document.getElementById('departures').innerHTML='<div class="error">Error al cargar salidas desde Railway/AENA</div>';
  }finally{loading=false;}
}
function tick(){let n=nowReal();document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes());refreshLeft--;if(refreshLeft<0)refreshLeft=0;document.getElementById('nextRefresh').textContent=Math.floor(refreshLeft/60)+':'+String(refreshLeft%60).padStart(2,'0');if(refreshLeft===0)loadLive();updateCountdowns();}
function toggleFullScreen(){let el=document.documentElement;if(!document.fullscreenElement){if(el.requestFullscreen)el.requestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();}}
loadLive();setInterval(tick,1000);setInterval(()=>{renderAll();},30000);
</script>
